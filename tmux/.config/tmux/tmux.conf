# tmux configuration
#
# Session persistence for remote and agent work: the tmux server lives on the
# remote host, so a dropped link or closed Ghostty window won't kill a running
# Claude Code session. Ghostty is the viewer; tmux owns the session.
#
# XDG path (tmux 3.1+), so no ~/.tmux.conf. Reload edits with prefix + r — a
# running server does not re-read this on its own.

# =============================================================================
# PREFIX
# =============================================================================

# Two live prefixes. C-b stays primary so every cheatsheet and remote host
# behaves as documented (it only costs readline backward-char, covered by the
# arrows). C-Space is the comfortable one to reach for: the terminal has no
# distinct code for it and sends a raw NUL (0x00), which tmux reads as
# C-Space, and it's free across zsh and Ghostty. Trade-off: it shadows
# Neovim's insert-mode blink.cmp trigger (also C-Space) for panes inside tmux.
set -g prefix C-b
set -g prefix2 C-Space

# Doubling the prefix sends it through to whatever is inside the pane. tmux ships
# `bind C-b send-prefix` and stops there: that binding names the *default* prefix
# literally rather than tracking whichever prefix is set, so prefix2 never got an
# equivalent and C-Space C-Space did nothing at all — it isn't bound, so tmux ate
# the second one and waited. This is the line that makes the two prefixes
# interchangeable rather than one of them being second-class at the only job where
# the distinction shows.
#
# Only nesting cares, and the aigent cockpit is the one place here that nests (see
# bin/README.md): two tmux clients stacked, the outer one eating every prefix, so
# doubling is the only way to reach the inner client. C-Space C-Space s re-points a
# single cockpit pane at a different agent; plain C-Space s would switch the whole
# outer view instead and drop you out of the grid.
#
# -2 so C-Space sends C-Space, keeping the rule symmetric — double whichever prefix
# you reached for. A bare `send-prefix` here would work too (verified) but delivers
# a C-b for a C-Space you pressed. That trade is worth naming: sending C-b is the
# more robust byte into a tmux you do not own, since C-b is the default prefix
# everywhere and C-Space is only a prefix because this file says so. That case is
# exactly what C-b C-b is still there for, so this one stays symmetric.
bind C-Space send-prefix -2

# =============================================================================
# TERMINAL / COLOR
# =============================================================================

# What tmux advertises inside panes. tmux-256color (modern ncurses) describes
# italics correctly, unlike screen-256color.
set -g default-terminal "tmux-256color"

# No truecolor/undercurl settings needed: Ghostty sets TERM=xterm-ghostty, whose
# terminfo declares Tc, Smulx and Setulc, so tmux derives RGB and forwards
# styled underlines by itself. The terminal-overrides / terminal-features lines
# the undercurl guides tell you to paste are redundant here; they exist for
# terminals with incomplete terminfo.

# xterm-256color is the exception: it advertises neither truecolor nor extended
# keys, so both have to be declared by hand. Two clients arrive under that TERM —
# Zed, whose terminal reports it despite supporting both (zed#22615), and any ssh
# session, since ~/.ssh/config pins TERM=xterm-256color for every host. Without
# this line an agent under tmux in Zed, or a tmux started on a remote, loses
# truecolor and Shift+Enter.
set -as terminal-features "xterm-256color:RGB:extkeys"

# =============================================================================
# PASSTHROUGH & CLIPBOARD
# =============================================================================

# Let panes emit escape sequences tmux doesn't understand instead of swallowing
# them. Required by image.nvim/diagram.nvim to draw via the Kitty graphics
# protocol (see nvim/.config/nvim/lua/plugins/diagram.lua).
set -g allow-passthrough on

# OSC 52: let a program inside tmux (remote Neovim, an agent) push a yank to the
# local macOS clipboard. `on` is required — the default `external` lets tmux set
# the clipboard but forbids inner apps from doing so. Ghostty advertises Ms.
set -s set-clipboard on

# =============================================================================
# NEOVIM INTEROP
# =============================================================================

# tmux waits after ESC for a following sequence, which shows up as lag leaving
# insert mode in Neovim. 10ms: long enough for a real sequence over ssh, short
# enough to feel instant. (0 can misparse on laggy links.)
set -sg escape-time 10

# Forward focus events so Neovim autoread and FocusGained/FocusLost work in tmux.
set -g focus-events on

# Extended keys (CSI-u). Legacy input can't encode Ctrl+Shift+<punct>, C-backtick
# or C-Esc, so those bindings die silently in tmux without this — which is most
# of the nvim agent workflow (toggle panel, new/cycle agent sessions, agent
# panel). Plain <C-\> survives because 0x1c is a real control code.
#
# All three lines are load-bearing — the one place Ghostty's terminfo is not
# enough:
#   extkeys  xterm-ghostty doesn't advertise it, so tmux never requests modified
#            keys from Ghostty without this.
#   always   `on` only forwards to apps using tmux's modifyOtherKeys handshake;
#            Neovim uses the Kitty protocol, which tmux doesn't implement (#3335).
#   csi-u    Neovim and Claude Code expect the CSI-u form, not the default xterm.
# (An abnormal ssh exit's stranded CSI-u is cleaned up by sources/ssh.sh.)
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features "xterm-ghostty:extkeys"

# =============================================================================
# AGENT SESSIONS
# =============================================================================

# Agents are verbose, so raise scrollback — but it's the one part of tmux that
# costs real memory (~3.9KB/line of wide truecolor output). 20000 is ~78MB/pane
# worst case: deep enough for a long run, far below tmux-sensible's 50000 (~190MB).
# Cost is per line produced, so idle panes are free.
set -g history-limit 20000

# Claude Code rings the bell when it finishes or needs input. Forward it as a
# real bell to Ghostty/macOS: flag the window, let any window raise the alert,
# and keep it audible rather than a tmux status message.
setw -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# Flag a window quiet for 60s — an agent that finished or stalled in another
# window. Noisy with idle shells, so opt-in per window: prefix + m toggles it.
bind m if -F "#{monitor-silence}" \
  "setw monitor-silence 0 ; display 'silence alert: off'" \
  "setw monitor-silence 60 ; display 'silence alert: on (60s)'"

# Label each pane with its running command, so a wall of panes shows which is
# `claude` and which is a shell.
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_command} "

# Heavier glyphs for the same lines: ━ and ┳ rather than ─ and ┬. Cosmetic, and worth
# saying what it is *not*, because the name invites the assumption: it does not mark the
# active pane. Every border goes heavy, focused or not — measured, both panes render
# byte-identical glyphs — so the only active signal is still the colour, and a two-pane
# window still reads half green (the focused pane's label row) and half grey. Nor does it
# close the box: tmux draws borders between panes and never around the window, so the
# focused pane keeps its two green edges and no others.
#
# UTF-8 only. tmux falls back to plain ACS lines where the locale cannot carry it, so a
# remote host with a broken locale quietly gets single lines back — which costs nothing,
# since nothing here depends on the weight.
set -g pane-border-lines heavy

# =============================================================================
# STATUS BAR
# =============================================================================
#
# No colours set anywhere — tmux and the terminal supply their own, so nothing
# has to track the theme. (An earlier Ayu palette left tmux stranded on old
# colours after every theme change.) The bar keeps only content — session name
# left, clock right — with bg=default for a transparent background. Borders,
# window list, copy-mode selection and messages use tmux's stock styling.
# Agent sessions turn the status bar off entirely; see bin/.local/bin/aigent.
set -g status-style "bg=default"
set -g status-left " #S "
set -g status-right "%H:%M "
set -g status-left-length 30

# Ghostty tab title (macos-titlebar-style = tabs). Agent sessions read
# "claude · <what it's working on>". The default form is wrong for them: the
# session name is bookkeeping, the window name is whatever tmux last auto-set,
# and pane_current_command names the binary (which lies — Claude Code is
# `claude.exe`, cursor-agent is `node`).
#
#   @agent      what is running. Written by bin/.local/bin/aigent, so only its
#               sessions carry it; everything else uses the plain form.
#   pane_title  what it's working on. The agent publishes its session name via
#               OSC 2 (Claude Code's is the same name /resume lists).
#
# Two guards: tmux seeds pane_title with the hostname, so a title-less program
# falls back to the project dir; and Claude Code leads with a spinner glyph, so
# `s|||` drops the first word (a glyph-less title has no space to match, passes
# through intact).
set -g set-titles on
set -g set-titles-string "#{?@agent,#{@agent} · #{?#{==:#{pane_title},#{host}},#{b:pane_current_path},#{s|^[^ ]+ ||:pane_title}},#S:#W · #{pane_current_command}}"

# detach-on-destroy left at the default (on). Off would switch a client into some
# other session when its own is destroyed — quitting an agent would drop that Zed
# thread or nvim panel into an unrelated agent's session. On, the client detaches
# back to where it started.

# =============================================================================
# WINDOWS & PANES
# =============================================================================

# Number from 1 — 0 sits at the far end of the number row.
set -g base-index 1
setw -g pane-base-index 1

# Close window 2 of 3 and survivors renumber to 1,2 rather than 1,3.
set -g renumber-windows on

# Size to the smallest client actually viewing a window, not the smallest
# attached to the session — matters when a phone/second Ghostty attaches.
setw -g aggressive-resize on

# Mnemonic splits, opening in the current pane's directory (the "/% defaults
# stay bound, both starting in $HOME).
#
# All five are guarded: an agent session is one agent in one pane, and a second
# pane would make Zed, nvim and the picker lie about what they show. The guard
# refuses the key so nothing is created (a hook can only kill a pane after the
# split — there is no before-split-window). Bindings are server-global but read
# #{@agent_locked} from the session the key was pressed in, which only aigent
# sessions carry. Deliberate routes stay open: `split-window -t`, join-pane, and
# the prefix + < / > context menus.
bind | if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window -h -c "#{pane_current_path}"'
bind - if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window -v -c "#{pane_current_path}"'
bind '"' if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window'
bind % if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window -h'
bind c if -F '#{@agent_locked}' 'display "agent session: one agent, one window"' 'new-window'

# Lazygit over the current pane, using its own config from lazygit/.
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit

# Reload without restarting the server.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Messages sit long enough to read (default 750ms).
set -g display-time 4000
set -g status-interval 5

# Emacs keys at the command prompt regardless of mode-keys — it's a readline
# prompt, and vi mode there helps no one.
set -g status-keys emacs

# =============================================================================
# COPY MODE
# =============================================================================

# vi keys in history (prefix + [ to enter, q to leave).
setw -g mode-keys vi

# v/y like Neovim rather than tmux's Space/Enter. With set-clipboard on, y
# reaches the macOS clipboard even from a remote pane via OSC 52.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =============================================================================
# MOUSE
# =============================================================================

# Click to focus, wheel to scroll history, drag a border to resize, click a
# window name to switch. Cheap here: tmux runs on the alternate screen, so
# Ghostty's scrollback gets no pane output — there's no native scrollback to
# trade away, and pane history only exists inside tmux. Shift+drag still bypasses
# mouse reporting (Ghostty's mouse-shift-capture defaults false) for native
# selection across pane borders.
set -g mouse on

# Keep copy mode sticky while reading. The default MouseDragEnd copies-and-cancels,
# jumping back to the live cursor; copy-selection-no-clear still pushes the yank
# through set-clipboard/OSC 52 but leaves you at the same scroll position with the
# highlight visible. Double/triple-click match.
#
# A lone click clears the highlight. Whether it also *leaves* turns on where you are,
# and #{scroll_position} is 0 only at the live view:
#   scrolled up    stay. Cancelling snaps the viewport back down to the prompt and
#                  loses the place you were reading — the one thing this block exists
#                  to prevent. Leave with q, or just scroll to the bottom: the root
#                  WheelUpPane enters with copy-mode -e, which exits there by itself.
#   at the bottom  cancel. There's no position to lose, and this is the
#                  double-clicked-a-word case — the root binding enters with
#                  copy-mode -H, so staying would mean an *invisible* copy mode
#                  quietly eating keys meant for the agent.
# Escape clears without leaving; q leaves.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDown1Pane \
  select-pane \; if -F "#{selection_present}" \
    { if -F "#{scroll_position}" { send -X clear-selection } { send -X cancel } }
bind -T copy-mode-vi DoubleClick1Pane \
  select-pane \; send -X select-word \; run -d 0.3 \; send -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane \
  select-pane \; send -X select-line \; run -d 0.3 \; send -X copy-selection-no-clear
bind -T root DoubleClick1Pane \
  select-pane -t= \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    { send -M } \
    { copy-mode -H ; send -X select-word ; run -d 0.3 ; send -X copy-selection-no-clear }
bind -T root TripleClick1Pane \
  select-pane -t= \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    { send -M } \
    { copy-mode -H ; send -X select-line ; run -d 0.3 ; send -X copy-selection-no-clear }
