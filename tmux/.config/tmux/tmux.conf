# tmux configuration
#
# Purpose: session persistence for remote and agent work. The tmux server lives
# on the remote host, so a dropped Wi-Fi link, a closed Ghostty window, or a
# laptop lid no longer kills a long-running Claude Code session. Ghostty stays
# the viewer; tmux owns the session.
#
# XDG path — tmux 3.1+ reads ~/.config/tmux/tmux.conf, so no ~/.tmux.conf.
# Reload after edits with prefix + r (a running server does NOT re-read this).

# =============================================================================
# PREFIX
# =============================================================================

# Deliberately left at the default C-b. The popular C-a rebind shadows readline
# beginning-of-line, which we use constantly in zsh, and C-Space shadows
# blink.cmp's force-completion key (nvim/.../lsp/completion.lua). C-b's only
# casualty is readline backward-char, which the arrow keys already cover.

# =============================================================================
# TERMINAL / COLOR
# =============================================================================

# The value tmux advertises *inside* panes. tmux-256color ships with modern
# ncurses and, unlike screen-256color, describes italics correctly.
set -g default-terminal "tmux-256color"

# No truecolor setting needed, deliberately. Ghostty sets TERM=xterm-ghostty
# *outside*, and that terminfo declares `Tc` — tmux's own truecolor flag — so
# tmux derives the RGB feature by itself (verified: #{client_termfeatures}
# lists RGB with no color options set). The `Match exec` hook in ~/.ssh/config
# keeps the entry present on remotes, so this holds over ssh too; see
# ~/.local/bin/ssh-terminfo-sync.
#
# Both lines the tutorials tell you to paste are dead config here:
#   set -ag terminal-overrides ",xterm-256color:Tc"   # keys off a TERM we never send
#   set -as terminal-features ",xterm-ghostty:RGB"    # re-states what Tc already said
#
# Undercurl needs nothing either, for the same reason: xterm-ghostty's terminfo
# declares Smulx and Setulc, so tmux forwards Neovim's styled-underline (SGR
# 4:3) and underline-colour (SGR 58) sequences as-is. Verified end to end —
# nvim in a pane emits them and they reach the outer terminal intact. The
# `usstyle` feature and the Smulx/Setulc override lines you'll find in every
# undercurl guide are for terminals with incomplete terminfo (iTerm2, Konsole).

# =============================================================================
# PASSTHROUGH & CLIPBOARD
# =============================================================================

# Let applications inside a pane emit escape sequences tmux doesn't understand,
# instead of swallowing them. Required by image.nvim/diagram.nvim to draw
# diagrams through the Kitty graphics protocol — without it they render nothing
# inside tmux (see nvim/.config/nvim/lua/plugins/diagram.lua).
set -g allow-passthrough on

# OSC 52: let a program inside tmux — Neovim on a remote box, or an agent —
# push a yank all the way to the local macOS clipboard. `on` is required and
# the default `external` is not enough: external lets *tmux* set the clipboard
# but forbids applications inside from doing so (tmux Clipboard wiki). Ghostty
# advertises the Ms capability, so tmux has somewhere to forward it to.
set -s set-clipboard on

# =============================================================================
# NEOVIM INTEROP
# =============================================================================

# tmux waits after ESC to see if an escape sequence follows, which surfaces in
# Neovim as lag leaving insert mode. 10ms is long enough for a real sequence to
# arrive over ssh, short enough to feel instant. (`:checkhealth` flags higher
# values; 0 is tmux-sensible's choice but can misparse sequences on laggy links.)
set -sg escape-time 10

# Forward terminal focus events into panes so Neovim's autoread fires and
# FocusGained/FocusLost autocmds work inside tmux.
set -g focus-events on

# extended-keys is deliberately NOT enabled. The usual reason to want it is
# Shift+Enter in Claude Code, but Ghostty already binds that to `text:\x1b\r`
# and those bytes pass through tmux untouched. Turning it on risks the CSI-u
# escape garbage that sources/ssh.sh exists to clean up.

# =============================================================================
# AGENT SESSIONS
# =============================================================================

# Agents are verbose — a single run can bury the start of the conversation.
set -g history-limit 50000

# Claude Code rings the terminal bell when it finishes or needs input. Forward
# it: monitor-bell flags the window, bell-action any means any window can raise
# the alert, and visual-bell off keeps the BEL a real bell, so it reaches
# Ghostty (and macOS) instead of being swallowed into a tmux status message.
setw -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# Flag a window whose pane has gone quiet for 60s — an agent that finished (or
# stalled) while you were in another window. Noisy if you keep idle shells
# around, so it's opt-in per window: prefix + m toggles it.
bind m if -F "#{monitor-silence}" \
  "setw monitor-silence 0 ; display 'silence alert: off'" \
  "setw monitor-silence 60 ; display 'silence alert: on (60s)'"

# Label each pane with the command running in it, so a wall of panes tells you
# at a glance which one is `claude` and which is a shell.
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_command} "

# Surface session:window in Ghostty's tab title (macos-titlebar-style = tabs).
set -g set-titles on
set -g set-titles-string "#S:#W · #{pane_current_command}"

# Killing a session drops you into another one rather than back to a bare shell.
set -g detach-on-destroy off

# =============================================================================
# WINDOWS & PANES
# =============================================================================

# Number from 1 — 0 sits at the far end of the number row, away from its window.
set -g base-index 1
setw -g pane-base-index 1

# Close window 2 of 3 and the survivors become 1,2 rather than 1,3.
set -g renumber-windows on

# Size windows to the smallest client actually looking at them, not the smallest
# client attached to the session — matters when a phone/second Ghostty attaches.
setw -g aggressive-resize on

# Mnemonic splits, opening in the current pane's directory (the `"`/`%` defaults
# stay bound and both start in $HOME).
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Lazygit over the current pane, using its own config from lazygit/.
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit

# Reload without restarting the server.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Messages sit long enough to actually read (default 750ms).
set -g display-time 4000
set -g status-interval 5

# Emacs keys at the tmux command prompt regardless of mode-keys below — this is
# a readline-style prompt, and vi mode there is nobody's friend.
set -g status-keys emacs

# =============================================================================
# COPY MODE
# =============================================================================

# vi keys to move around history (prefix + [ to enter, q to leave).
setw -g mode-keys vi

# v/y like Neovim rather than tmux's Space/Enter. With set-clipboard on above,
# y reaches the macOS clipboard even from a remote pane, via OSC 52.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =============================================================================
# MOUSE
# =============================================================================

# Deliberately off. `set -g mouse on` routes scroll and click-drag to tmux
# copy-mode, which costs Ghostty's native scrollback and select-to-copy inside
# every pane — selection then needs Shift (or Option, given macos-option-as-alt).
# Uncomment if click-to-switch-pane is worth that trade:
# set -g mouse on
