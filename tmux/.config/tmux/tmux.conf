# tmux configuration
#
# Purpose: session persistence for remote and agent work. The tmux server lives
# on the remote host, so a dropped Wi-Fi link, a closed Ghostty window, or a
# laptop lid no longer kills a long-running Claude Code session. Ghostty stays
# the viewer; tmux owns the session.
#
# XDG path — tmux 3.1+ reads ~/.config/tmux/tmux.conf, so no ~/.tmux.conf.
# Reload after edits with prefix + r (a running server does NOT re-read this).

# =============================================================================
# PREFIX
# =============================================================================

# Two prefixes, both live. C-b stays as the primary so every cheatsheet, every
# guide and every remote host behaves as documented, and it only costs readline
# backward-char (the arrow keys already cover that). M-Space is the comfortable
# one to actually reach for.
#
# The two obvious rebinds are both taken here: C-a shadows readline
# beginning-of-line, which we use constantly in zsh, and C-Space shadows
# blink.cmp's force-completion key (nvim/.../lsp/completion.lua). M-Space is
# free across zsh, Neovim (only <A-j>/<A-k> are bound) and Ghostty.
set -g prefix C-b
set -g prefix2 M-Space

# =============================================================================
# TERMINAL / COLOR
# =============================================================================

# The value tmux advertises *inside* panes. tmux-256color ships with modern
# ncurses and, unlike screen-256color, describes italics correctly.
set -g default-terminal "tmux-256color"

# No truecolor setting needed, deliberately. Ghostty sets TERM=xterm-ghostty
# *outside*, and that terminfo declares `Tc` — tmux's own truecolor flag — so
# tmux derives the RGB feature by itself (verified: #{client_termfeatures}
# lists RGB with no color options set). The `Match exec` hook in ~/.ssh/config
# keeps the entry present on remotes, so this holds over ssh too; see
# ~/.local/bin/ssh-terminfo-sync.
#
# Both lines the tutorials tell you to paste are dead config here:
#   set -ag terminal-overrides ",xterm-256color:Tc"   # keys off a TERM we never send
#   set -as terminal-features ",xterm-ghostty:RGB"    # re-states what Tc already said
#
# Undercurl needs nothing either, for the same reason: xterm-ghostty's terminfo
# declares Smulx and Setulc, so tmux forwards Neovim's styled-underline (SGR
# 4:3) and underline-colour (SGR 58) sequences as-is. Verified end to end —
# nvim in a pane emits them and they reach the outer terminal intact. The
# `usstyle` feature and the Smulx/Setulc override lines you'll find in every
# undercurl guide are for terminals with incomplete terminfo (iTerm2, Konsole).

# Zed is the exception that needs all of it spelled out. Its terminal reports
# TERM=xterm-256color (deliberately — zed#22615 chose it over `alacritty` for
# terminfo portability), and that entry advertises neither truecolor nor
# extended keys, even though Zed's emulator supports both and sets
# COLORTERM=truecolor to say so. Without this, an agent running under tmux in
# Zed's remote terminal loses truecolor and loses Shift+Enter.
set -as terminal-features "xterm-256color:RGB:extkeys"

# =============================================================================
# PASSTHROUGH & CLIPBOARD
# =============================================================================

# Let applications inside a pane emit escape sequences tmux doesn't understand,
# instead of swallowing them. Required by image.nvim/diagram.nvim to draw
# diagrams through the Kitty graphics protocol — without it they render nothing
# inside tmux (see nvim/.config/nvim/lua/plugins/diagram.lua).
set -g allow-passthrough on

# OSC 52: let a program inside tmux — Neovim on a remote box, or an agent —
# push a yank all the way to the local macOS clipboard. `on` is required and
# the default `external` is not enough: external lets *tmux* set the clipboard
# but forbids applications inside from doing so (tmux Clipboard wiki). Ghostty
# advertises the Ms capability, so tmux has somewhere to forward it to.
set -s set-clipboard on

# =============================================================================
# NEOVIM INTEROP
# =============================================================================

# tmux waits after ESC to see if an escape sequence follows, which surfaces in
# Neovim as lag leaving insert mode. 10ms is long enough for a real sequence to
# arrive over ssh, short enough to feel instant. (`:checkhealth` flags higher
# values; 0 is tmux-sensible's choice but can misparse sequences on laggy links.)
set -sg escape-time 10

# Forward terminal focus events into panes so Neovim's autoread fires and
# FocusGained/FocusLost autocmds work inside tmux.
set -g focus-events on

# Extended keys (CSI-u). Legacy terminal input can only encode a couple of dozen
# control keys, and every binding outside that set dies silently inside tmux
# without this — which is most of the nvim agent workflow:
#
#   <C-`>                       toggle bottom panel   (plugins/editor/snacks.lua)
#   <C-S-\>                     new agent session     (plugins/agents.lua)
#   <C-S-]> <C-S-[> <C-S-.>     cycle sessions, send context
#   <C-Esc>                     agent panel
#
# Plain <C-\> survives because 0x1c is a real control code; Ctrl+Shift+<punct>,
# Ctrl+backtick and Ctrl+Esc have no byte encoding at all outside CSI-u.
#
# All three lines below are load-bearing. This is the one place Ghostty's
# terminfo is NOT enough, unlike Tc and Smulx above:
#
#   extkeys  "tmux will always request extended keys itself if the terminal
#            supports them" (man tmux) — and it decides that from terminfo.
#            xterm-ghostty does not advertise extkeys, so without this tmux
#            never asks Ghostty for modified keys and they never arrive at all.
#   always   With `on`, tmux only forwards to applications that ask via tmux's
#            own modifyOtherKeys handshake. Neovim asks via the Kitty keyboard
#            protocol, which tmux does not implement (tmux#3335), so `on`
#            forwards nothing to it.
#   csi-u    The default format is `xterm` (^[[27;6;92~). Neovim and Claude Code
#            expect the CSI-u form (^[[92;6u).
#
# The CSI-u leftovers an abnormal ssh exit can strand are cleaned up by the
# `ssh` wrapper in sources/ssh.sh.
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features "xterm-ghostty:extkeys"

# =============================================================================
# AGENT SESSIONS
# =============================================================================

# Agents are verbose — tmux's 2000-line default buries the start of a run. But
# scrollback is the one part of tmux that actually costs memory: measured at
# ~3.9KB per line of wide truecolor output (a Claude Code pane is exactly that),
# so 50000 — tmux-sensible's number — is ~190MB per pane in the worst case.
# 20000 is ~78MB: deep enough for a long agent run, twice Ghostty's own
# scrollback-limit, and nowhere near the tail. Cost is per line actually
# produced, so idle panes are free.
set -g history-limit 20000

# Claude Code rings the terminal bell when it finishes or needs input. Forward
# it: monitor-bell flags the window, bell-action any means any window can raise
# the alert, and visual-bell off keeps the BEL a real bell, so it reaches
# Ghostty (and macOS) instead of being swallowed into a tmux status message.
setw -g monitor-bell on
set -g bell-action any
set -g visual-bell off

# Flag a window whose pane has gone quiet for 60s — an agent that finished (or
# stalled) while you were in another window. Noisy if you keep idle shells
# around, so it's opt-in per window: prefix + m toggles it.
bind m if -F "#{monitor-silence}" \
  "setw monitor-silence 0 ; display 'silence alert: off'" \
  "setw monitor-silence 60 ; display 'silence alert: on (60s)'"

# Label each pane with the command running in it, so a wall of panes tells you
# at a glance which one is `claude` and which is a shell.
set -g pane-border-status top
set -g pane-border-format " #P: #{pane_current_command} "

# =============================================================================
# STYLE
# =============================================================================
#
# Ayu, to match Ghostty (theme = Ayu, background overridden to true black).
# tmux's own defaults are green — not a choice anyone made, just the default.
#
#   #e6b450  Ayu accent (Ghostty's cursor colour) — active/current
#   #555555  Ghostty's split-divider-color        — inactive borders
#   #686868  Ayu's bright black                   — dim text
#   #f07178  Ayu's red                            — alerts
#   #409fff  Ghostty's selection background       — copy-mode selection

# Borders: inactive matches Ghostty's split divider exactly, so a tmux pane
# split and a Ghostty split look like the same thing.
set -g pane-border-style "fg=#555555"
set -g pane-active-border-style "fg=#e6b450"

# Status bar: transparent background (so it's the true black of the terminal,
# not a green slab), dim text, session name in the accent.
set -g status-style "bg=default fg=#686868"
set -g status-left " #[fg=#e6b450,bold]#S#[default] "
set -g status-right "#[fg=#686868]%H:%M "
set -g status-left-length 30

# Windows: current in the accent. A window with a bell — an agent wanting input
# — goes red, which is the whole point of monitor-bell above.
setw -g window-status-current-style "fg=#e6b450,bold"
setw -g window-status-style "fg=#686868"
setw -g window-status-bell-style "fg=#f07178,bold"
setw -g window-status-activity-style "fg=#f07178"

# Copy-mode selection, matching Ghostty's own selection colours.
setw -g mode-style "bg=#409fff fg=#0b0e14"

# Messages and the command prompt, in the accent rather than tmux's green.
set -g message-style "bg=#e6b450 fg=#0b0e14"

# Ghostty's tab title (macos-titlebar-style = tabs).
#
# Agent sessions read "claude · Set up tmux with Ghostty terminal": what is running,
# then what it is working on. The default form is the wrong answer three times over
# for them — the session name is internal bookkeeping (aigent-_dotfiles), the window
# name is whatever tmux last auto-renamed it to, and pane_current_command names the
# *binary*, which lies (Claude Code is a Bun single-file executable, `claude.exe`;
# cursor-agent is a Node wrapper, `node`).
#
#   @agent      what is running. Written by bin/.local/bin/aigent, so only sessions
#               it created carry it — everything else keeps the plain form below.
#   pane_title  what it is working on. An agent publishes its own session name as
#               the terminal title (OSC 2) and tmux hands it back here. Claude Code
#               puts its summary there — the same name /resume lists.
#
# Two guards. tmux seeds pane_title with the *hostname*, so a program that never set
# a title reads back `airbochs`; that case falls back to the project directory. And
# Claude Code leads with an animated spinner glyph ("⠐ Set up tmux…"), so `s|||`
# drops the first word — a glyph-less title (opencode's "OpenCode") has no space to
# match and passes through intact.
set -g set-titles on
set -g set-titles-string "#{?@agent,#{@agent} · #{?#{==:#{pane_title},#{host}},#{b:pane_current_path},#{s|^[^ ]+ ||:pane_title}},#S:#W · #{pane_current_command}}"

# detach-on-destroy is deliberately left at the default (on). Turning it off
# switches the client into some *other* session when its own is destroyed — so
# quitting an agent would drop that Zed thread or nvim panel into an unrelated
# agent's session rather than back to the terminal it came from, and with one
# session per agent (bin/.local/bin/aigent) there is usually another one to land
# in. On, the client simply detaches and you are back where you started.

# =============================================================================
# WINDOWS & PANES
# =============================================================================

# Number from 1 — 0 sits at the far end of the number row, away from its window.
set -g base-index 1
setw -g pane-base-index 1

# Close window 2 of 3 and the survivors become 1,2 rather than 1,3.
set -g renumber-windows on

# Size windows to the smallest client actually looking at them, not the smallest
# client attached to the session — matters when a phone/second Ghostty attaches.
setw -g aggressive-resize on

# Mnemonic splits, opening in the current pane's directory (the `"`/`%` defaults
# stay bound and both start in $HOME).
#
# All five are guarded: an agent session is one agent in one pane, and a second pane
# would make Zed, nvim and the picker all lie about what they are showing — each
# treats the session as a single view. The guard refuses the key, so nothing is ever
# created — the alternative was a hook, and a hook can only undo the split *after* the
# fact (every tmux hook is after-*; there is no before-split-window), which means
# creating a pane and killing it.
#
# The bindings are server-global, as all tmux bindings are. The *behaviour* is
# per-session: #{@agent_locked} is read from the session the key was pressed in,
# and only sessions created by bin/.local/bin/aigent carry it. Anything you start
# yourself splits exactly as before.
#
# Deliberate routes stay open — `tmux split-window -t aigent-api` from elsewhere,
# join-pane, and the split entries in the prefix + < / > context menus. Those name
# the session as a target or take real navigation to reach, so they are not the
# accidents this guards against.
bind | if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window -h -c "#{pane_current_path}"'
bind - if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window -v -c "#{pane_current_path}"'
bind '"' if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window'
bind % if -F '#{@agent_locked}' 'display "agent session: one agent, one pane"' 'split-window -h'
bind c if -F '#{@agent_locked}' 'display "agent session: one agent, one window"' 'new-window'

# Lazygit over the current pane, using its own config from lazygit/.
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" lazygit

# Reload without restarting the server.
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Messages sit long enough to actually read (default 750ms).
set -g display-time 4000
set -g status-interval 5

# Emacs keys at the tmux command prompt regardless of mode-keys below — this is
# a readline-style prompt, and vi mode there is nobody's friend.
set -g status-keys emacs

# =============================================================================
# COPY MODE
# =============================================================================

# vi keys to move around history (prefix + [ to enter, q to leave).
setw -g mode-keys vi

# v/y like Neovim rather than tmux's Space/Enter. With set-clipboard on above,
# y reaches the macOS clipboard even from a remote pane, via OSC 52.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# =============================================================================
# MOUSE
# =============================================================================

# Click a pane to focus it, wheel to scroll history, drag a border to resize,
# click a window name in the status line to switch to it.
#
# This costs less than the usual warning suggests. tmux runs on the alternate
# screen (it emits smcup on attach — verified), so Ghostty's scrollback receives
# no pane output whatever: there is no native scrollback here to trade away, and
# with the mouse off the wheel does nothing at all. Pane history only exists
# inside tmux, and the wheel is the natural way to reach it.
#
# The one real trade is selection: a drag is now tmux's, not Ghostty's. tmux's
# own drag-select copies to the macOS clipboard anyway (set-clipboard above),
# and Ghostty's mouse-shift-capture defaults to false, so Shift+drag bypasses
# mouse reporting entirely and gives back native selection across pane borders.
set -g mouse on

# Default MouseDragEnd1Pane is copy-pipe-and-cancel: copying exits copy mode and
# jumps the view back to the live cursor. That fights "scroll up, grab a line,
# keep reading". copy-selection-no-clear still pushes the yank through
# set-clipboard / OSC 52, but leaves you in copy mode at the same scroll
# position with the highlight still visible. Double/triple-click match that.
#
# A lone click with a selection active then cancels copy mode — clears the
# highlight and returns to the live cursor — which the default MouseDown1Pane
# (select-pane only) never did. Escape clears the highlight without leaving if
# you want to keep reading / drag another selection. q or scroll-to-bottom
# (WheelUp enters with copy-mode -e) also leave.
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-no-clear
bind -T copy-mode-vi MouseDown1Pane \
  select-pane \; if -F "#{selection_present}" { send -X cancel }
bind -T copy-mode-vi DoubleClick1Pane \
  select-pane \; send -X select-word \; run -d 0.3 \; send -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane \
  select-pane \; send -X select-line \; run -d 0.3 \; send -X copy-selection-no-clear
bind -T root DoubleClick1Pane \
  select-pane -t= \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    { send -M } \
    { copy-mode -H ; send -X select-word ; run -d 0.3 ; send -X copy-selection-no-clear }
bind -T root TripleClick1Pane \
  select-pane -t= \; if -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" \
    { send -M } \
    { copy-mode -H ; send -X select-line ; run -d 0.3 ; send -X copy-selection-no-clear }
