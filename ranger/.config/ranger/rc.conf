map oc code

set column_ratios 1,2,5

# Image previews need an external backend (Pillow + kitty/w3m) which is not
# installed, and the w3m method hangs in Ghostty. Keep them off so ranger
# stays self-contained. Text previews via scope.sh still work and degrade
# gracefully when optional tools (highlight, etc.) are absent.
set preview_images false

# Never block the UI trying to read/highlight a giant file.
set preview_max_size 1048576
